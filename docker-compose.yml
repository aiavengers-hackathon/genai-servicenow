services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: sh -c "npm install && node server.js"

  frontend:
   image: node:20
   ports:
    - "3000:3000"
   working_dir: /app
   volumes:
    - ./frontend:/app
    - /app/node_modules
   command: sh -c "npm install && npm run dev -- --host 0.0.0.0"